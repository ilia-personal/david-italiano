<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Il Mercato di Roma — Урок 1</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #f0f4f8 0%, #e8edf3 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 12px 24px;
  }

  /* ── CARD ── */
  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.13), 0 2px 8px rgba(0,0,0,0.07);
    width: 100%;
    max-width: 440px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    background: #009246;
    color: #fff;
    padding: 14px 18px 10px;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .header-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .slide-counter {
    font-size: 13px;
    opacity: 0.88;
    font-weight: 600;
  }
  .progress-bar-track {
    background: rgba(255,255,255,0.3);
    border-radius: 6px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    background: #fff;
    height: 100%;
    border-radius: 6px;
    transition: width 0.4s ease;
  }

  /* ── SLIDE BODY ── */
  .slide-body {
    padding: 22px 20px 18px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ── INTRO SLIDE ── */
  .intro-flag {
    font-size: 56px;
    text-align: center;
    margin-bottom: 4px;
  }
  .intro-main-title {
    font-size: 24px;
    font-weight: 800;
    color: #009246;
    text-align: center;
    line-height: 1.2;
  }
  .intro-subtitle-ru {
    font-size: 14px;
    color: #ce2b37;
    font-weight: 600;
    text-align: center;
    margin-top: 4px;
  }
  .intro-lesson-tag {
    background: #f0f9f4;
    border: 1px solid #b2dfcc;
    border-radius: 10px;
    padding: 10px 14px;
    text-align: center;
    font-size: 14px;
    color: #555;
  }
  .intro-lesson-tag strong { color: #009246; }
  .intro-steps {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .intro-steps li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 15px;
    color: #333;
    line-height: 1.4;
  }
  .intro-steps li span.icon { font-size: 18px; flex-shrink: 0; }
  .start-btn {
    background: #009246;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 16px 24px;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    margin-top: 4px;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.4px;
  }
  .start-btn:active { background: #007a38; transform: scale(0.98); }

  /* ── STORY SLIDE ── */
  .story-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #e8f5ec;
    color: #009246;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    border-radius: 8px;
    padding: 4px 10px;
    width: fit-content;
  }
  .italian-text {
    font-size: 18px;
    line-height: 1.65;
    color: #1a1a1a;
    font-weight: 400;
  }
  .dialogue .italian-text {
    font-style: italic;
  }
  .translation-box {
    background: #f8f9fa;
    border-left: 3px solid #009246;
    border-radius: 0 10px 10px 0;
    padding: 12px 14px;
    display: none;
  }
  .translation-box.visible { display: block; }
  .translation-text {
    font-size: 15px;
    color: #555;
    line-height: 1.55;
    font-style: italic;
  }
  .story-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 2px;
  }
  .btn-tts {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #fff;
    color: #009246;
    border: 2px solid #009246;
    border-radius: 10px;
    padding: 9px 14px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .btn-tts:active { background: #e8f5ec; }
  .btn-tts.playing {
    background: #009246;
    color: #fff;
  }
  .btn-translate {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #fff;
    color: #555;
    border: 2px solid #ccc;
    border-radius: 10px;
    padding: 9px 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .btn-translate:active { background: #f0f0f0; }
  .btn-translate.active {
    border-color: #009246;
    color: #009246;
    background: #f0f9f4;
  }
  .btn-ask-mario {
    display: flex;
    align-items: center;
    gap: 5px;
    background: #fff;
    color: #777;
    border: 1.5px solid #ccc;
    border-radius: 10px;
    padding: 7px 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .btn-ask-mario:active { background: #f5f5f5; }
  .btn-ask-mario:hover { border-color: #009246; color: #009246; }
  /* ── ECHO CHECK (Option 1) ── */
  .btn-echo {
    display: flex; align-items: center; gap: 6px;
    background: #fff; color: #ce2b37; border: 2px solid #ce2b37;
    border-radius: 10px; padding: 9px 14px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; flex-shrink: 0;
  }
  .btn-echo:active { background: #fde8ea; }
  .btn-echo.recording { background: #ce2b37; color: #fff; animation: echoPulse 0.7s infinite; }
  @keyframes echoPulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
  .echo-result {
    display: none; margin-top: 12px; padding: 12px 14px;
    background: #f8f9fa; border-radius: 10px; border-left: 3px solid #ce2b37;
  }
  .echo-words { font-size: 17px; line-height: 1.8; margin-bottom: 6px; }
  .echo-w { display: inline-block; padding: 1px 3px; border-radius: 4px; margin: 1px; }
  .echo-w.hit { background: #d4edda; color: #155724; font-weight: 700; }
  .echo-w.miss { background: #f8d7da; color: #721c24; text-decoration: underline dotted; }
  .echo-score { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .echo-heard { font-size: 12px; color: #888; font-style: italic; }
  /* ── CLOZE SLIDE (Option 2) ── */
  .cloze-label {
    display: inline-flex; align-items: center; gap: 6px;
    background: #e8eaf6; color: #3949ab; font-size: 12px; font-weight: 700;
    letter-spacing: 0.6px; text-transform: uppercase;
    border-radius: 8px; padding: 4px 10px; width: fit-content;
  }
  .cloze-sentence {
    font-size: 22px; line-height: 1.5; color: #1a1a1a; font-weight: 400;
    margin: 4px 0;
  }
  .cloze-blank {
    display: inline-block; min-width: 120px; border-bottom: 3px solid #3949ab;
    color: #3949ab; font-weight: 700; font-size: 22px; padding: 0 6px;
    text-align: center; vertical-align: bottom;
  }
  .cloze-hint { font-size: 14px; color: #888; font-style: italic; margin-top: 2px; }
  .cloze-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  .btn-cloze-mic {
    background: #fff; color: #3949ab; border: 2px solid #3949ab;
    border-radius: 10px; padding: 12px 20px; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px;
  }
  .btn-cloze-mic.recording { background: #3949ab; color: #fff; animation: echoPulse 0.7s infinite; }
  .cloze-input-row { display: flex; gap: 8px; width: 100%; }
  .cloze-text-input {
    flex: 1; border: 2px solid #ccc; border-radius: 10px; padding: 12px 14px;
    font-size: 16px; outline: none;
  }
  .cloze-text-input:focus { border-color: #3949ab; }
  .btn-cloze-submit {
    background: #3949ab; color: #fff; border: none; border-radius: 10px;
    padding: 12px 18px; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .cloze-feedback {
    margin-top: 10px; padding: 12px 14px; border-radius: 10px;
    font-size: 16px; font-weight: 700; display: none;
  }
  .cloze-feedback.correct { background: #d4edda; color: #155724; border-left: 3px solid #28a745; }
  .cloze-feedback.wrong   { background: #f8d7da; color: #721c24; border-left: 3px solid #dc3545; }

  /* ── TRANSLATE ALOUD (Option 3) ── */
  .translate-label {
    display: inline-flex; align-items: center; gap: 6px;
    background: #fff3e0; color: #e65100; font-size: 12px; font-weight: 700;
    letter-spacing: 0.6px; text-transform: uppercase;
    border-radius: 8px; padding: 4px 10px; width: fit-content;
  }
  .translate-russian {
    font-size: 21px; line-height: 1.5; color: #1a1a1a; font-weight: 500;
    background: #fff8e1; border-left: 3px solid #e65100;
    border-radius: 0 10px 10px 0; padding: 12px 16px;
  }
  .translate-hint { font-size: 13px; color: #888; font-style: italic; }
  .translate-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  .btn-translate-mic {
    background: #fff; color: #e65100; border: 2px solid #e65100;
    border-radius: 10px; padding: 12px 20px; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px;
  }
  .btn-translate-mic.recording { background: #e65100; color: #fff; animation: echoPulse 0.7s infinite; }
  .translate-feedback { display: none; margin-top: 10px; }
  .translate-words { font-size: 16px; line-height: 1.9; margin-bottom: 6px; }
  .translate-score { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .translate-heard { font-size: 12px; color: #888; font-style: italic; }
  .translate-correct-line {
    font-size: 14px; color: #555; margin-top: 6px;
    padding: 8px 12px; background: #f8f9fa; border-radius: 8px;
  }
  /* ── DIALOGUE MODE (Option 4) ── */
  .dialogue-label {
    display: inline-flex; align-items: center; gap: 6px;
    background: #f3e5f5; color: #7b1fa2; font-size: 12px; font-weight: 700;
    letter-spacing: 0.6px; text-transform: uppercase;
    border-radius: 8px; padding: 4px 10px; width: fit-content;
  }
  .dialogue-role { font-size: 13px; color: #7b1fa2; font-weight: 700; margin-bottom: 2px; }
  .dialogue-line {
    font-size: 18px; line-height: 1.5; font-style: italic; color: #333;
    background: #f3e5f5; border-radius: 10px; padding: 12px 16px; margin-bottom: 4px;
  }
  .dialogue-my-role { font-size: 13px; color: #009246; font-weight: 700; margin-top: 6px; }
  .dialogue-prompt { font-size: 17px; color: #555; font-style: italic; }
  .dialogue-ru { font-size: 13px; color: #888; margin: 2px 0 6px; font-style: italic; }
  .btn-dialogue-play {
    background: #7b1fa2; color: #fff; border: none;
    border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .btn-dialogue-play.playing { opacity: 0.7; }
  .btn-dialogue-mic {
    background: #fff; color: #009246; border: 2px solid #009246;
    border-radius: 10px; padding: 12px 20px; font-size: 15px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; gap: 8px;
  }
  .btn-dialogue-mic.recording { background: #009246; color: #fff; animation: echoPulse 0.7s infinite; }
  .dialogue-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
  .dialogue-result { display: none; margin-top: 10px; }
  /* ── STORY RETELL (Option 5) ── */
  .retell-label {
    display: inline-flex; align-items: center; gap: 6px;
    background: #e3f2fd; color: #1565c0; font-size: 12px; font-weight: 700;
    letter-spacing: 0.6px; text-transform: uppercase;
    border-radius: 8px; padding: 4px 10px; width: fit-content;
  }
  .retell-prompt { font-size: 20px; font-weight: 600; color: #1a1a1a; line-height: 1.4; }
  .retell-subprompt { font-size: 14px; color: #777; margin-top: 4px; }
  .btn-retell-mic {
    background: #fff; color: #1565c0; border: 2px solid #1565c0;
    border-radius: 10px; padding: 14px 24px; font-size: 16px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%;
    justify-content: center; margin-top: 8px;
  }
  .btn-retell-mic.recording { background: #1565c0; color: #fff; animation: echoPulse 0.7s infinite; }
  .retell-keywords {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px;
  }
  .retell-kw {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 10px; border-radius: 20px; font-size: 14px; font-weight: 600;
    border: 2px solid #ccc; color: #777; background: #f8f8f8;
  }
  .retell-kw.found { border-color: #28a745; color: #155724; background: #d4edda; }
  .retell-kw.not-found { border-color: #dc3545; color: #721c24; background: #f8d7da; }
  .retell-score-line { font-size: 16px; font-weight: 700; margin-top: 10px; }
  .retell-heard { font-size: 12px; color: #888; font-style: italic; margin-top: 6px; }

  /* ── QUIZ SLIDE ── */
  .quiz-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #fff3cd;
    color: #856404;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    border-radius: 8px;
    padding: 4px 10px;
    width: fit-content;
  }
  .quiz-question {
    font-size: 18px;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1.4;
  }
  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .quiz-option {
    background: #f8f9fa;
    border: 2px solid #dee2e6;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 17px;
    font-weight: 600;
    color: #333;
    cursor: pointer;
    text-align: left;
    transition: all 0.18s;
    line-height: 1.35;
  }
  .quiz-option:active { transform: scale(0.98); }
  .quiz-option:hover:not(.correct):not(.wrong):not(.disabled) {
    border-color: #009246;
    background: #f0f9f4;
  }
  .quiz-option.correct {
    background: #d4edda;
    border-color: #28a745;
    color: #155724;
    cursor: default;
  }
  .quiz-option.wrong {
    background: #f8d7da;
    border-color: #ce2b37;
    color: #721c24;
    cursor: default;
  }
  .quiz-option.disabled {
    cursor: default;
    opacity: 0.55;
  }
  .quiz-explanation {
    background: #e8f5ec;
    border-left: 3px solid #009246;
    border-radius: 0 10px 10px 0;
    padding: 12px 14px;
    font-size: 15px;
    color: #1a3a1a;
    line-height: 1.5;
    display: none;
  }
  .quiz-explanation.visible { display: block; }
  .quiz-mic-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .btn-mic {
    display: flex;
    align-items: center;
    gap: 5px;
    background: #fff;
    color: #ce2b37;
    border: 1.5px solid #ce2b37;
    border-radius: 10px;
    padding: 7px 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-mic:active { background: #f8d7da; }
  .btn-mic.recording {
    background: #ce2b37;
    color: #fff;
    animation: pulse-rec 1s infinite;
  }
  .mic-hint {
    font-size: 12px;
    color: #999;
    font-style: italic;
  }
  @keyframes pulse-rec {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* ── RESULTS SLIDE ── */
  .results-emoji {
    font-size: 64px;
    text-align: center;
  }
  .results-title {
    font-size: 24px;
    font-weight: 800;
    color: #1a1a1a;
    text-align: center;
    line-height: 1.2;
  }
  .results-score {
    text-align: center;
    font-size: 48px;
    font-weight: 900;
    color: #009246;
    line-height: 1;
  }
  .results-score span {
    font-size: 22px;
    color: #888;
    font-weight: 600;
  }
  .results-message {
    font-size: 16px;
    color: #444;
    text-align: center;
    line-height: 1.5;
    background: #f8f9fa;
    border-radius: 12px;
    padding: 14px 16px;
  }
  .results-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .btn-restart {
    background: #009246;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-restart:active { background: #007a38; }
  .btn-copy-slack {
    background: #fff;
    color: #555;
    border: 2px solid #ccc;
    border-radius: 12px;
    padding: 13px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-copy-slack:active { background: #f5f5f5; }

  /* ── NAV FOOTER ── */
  .nav-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px 16px;
    border-top: 1px solid #eee;
    gap: 10px;
  }
  .btn-nav {
    background: #fff;
    color: #009246;
    border: 2px solid #009246;
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    min-width: 100px;
    text-align: center;
  }
  .btn-nav:active { background: #e8f5ec; }
  .btn-nav:disabled {
    opacity: 0.3;
    cursor: default;
    border-color: #ccc;
    color: #ccc;
  }
  .btn-nav.primary {
    background: #009246;
    color: #fff;
  }
  .btn-nav.primary:active { background: #007a38; }
  .btn-nav.primary:disabled {
    background: #ccc;
    border-color: #ccc;
    opacity: 0.5;
  }
  .btn-nav-next-locked {
    display: none;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #333;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 20px;
    border-radius: 12px;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 9999;
    white-space: nowrap;
    max-width: 90vw;
    text-align: center;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── ITALIAN FLAG STRIPE ── */
  .flag-stripe {
    display: flex;
    height: 5px;
  }
  .flag-stripe div { flex: 1; }
  .flag-stripe .green { background: #009246; }
  .flag-stripe .white { background: #fff; }
  .flag-stripe .red { background: #ce2b37; }

  /* ── SLIDE TRANSITIONS ── */
  .slide-wrapper {
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(18px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideInBack {
    from { opacity: 0; transform: translateX(-18px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .slide-back {
    animation: slideInBack 0.3s ease;
  }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="flag-stripe">
    <div class="green"></div>
    <div class="white"></div>
    <div class="red"></div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="header-title">🇮🇹 Il Mercato di Roma</div>
      <div class="slide-counter" id="slideCounter">0 / 26</div>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div style="margin-top:8px;display:flex;align-items:center;gap:8px">
      <span style="font-size:12px;opacity:0.8">🔊</span>
      <select id="voicePicker" onchange="setVoice(this.value)"
        style="flex:1;font-size:12px;padding:4px 8px;border-radius:8px;border:none;background:rgba(255,255,255,0.2);color:#fff;outline:none">

function stopTTS() {

    window.speechSynthesis.cancel();

  ttsPlaying = false;
  const btn = document.getElementById('ttsBtn');
  if (btn) {
    btn.classList.remove('playing');

  }
}

// ── Voice selection ──────────────────────────
let selectedVoice = null;

function loadVoices() {
  const voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('it'));
  const sel = document.getElementById('voicePicker');
  if (!sel || voices.length === 0) return;
  sel.innerHTML = voices.map((v, i) =>
    `<option value="${i}" ${selectedVoice && v.name === selectedVoice.name ? 'selected' : ''}>${v.name} (${v.lang})</option>`
  ).join('');
  // Auto-pick the most natural: prefer "Google" or "Alice" or first
  if (!selectedVoice) {
    const saved = localStorage.getItem('davidItalianoVoice');
    const pick = voices.find(v => v.name === saved)
      || voices.find(v => v.name.includes('Google'))
      || voices.find(v => v.name === 'Alice')
      || voices[0];
    selectedVoice = pick;
    sel.value = voices.indexOf(pick);
  }
}

function setVoice(idx) {
  const voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('it'));
  selectedVoice = voices[parseInt(idx)] || null;
  if (selectedVoice) localStorage.setItem('davidItalianoVoice', selectedVoice.name);
}

if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = loadVoices;
  setTimeout(loadVoices, 300);
}

function playTTS(text, btn) {
  if (!window.speechSynthesis) {
    showToast('TTS недоступен в этом браузере');
    return;
  }
  if (ttsPlaying) {
    stopTTS();
    return;
  }
  ttsPlaying = true;
  btn.classList.add('playing');
  btn.innerHTML = '⏹ Стоп';

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'it-IT';
  utter.rate = 0.82;
  utter.pitch = 1.0;
  if (selectedVoice) utter.voice = selectedVoice;

  utter.onend = () => {
    ttsPlaying = false;
    if (btn && document.body.contains(btn)) {
      btn.classList.remove('playing');
      btn.innerHTML = '🔊 Слушать';
    }
  };
  utter.onerror = () => {
    ttsPlaying = false;
    if (btn && document.body.contains(btn)) {
      btn.classList.remove('playing');
      btn.innerHTML = '🔊 Слушать';
    }
  };

  ttsUtterance = utter;
  window.speechSynthesis.speak(utter);
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text);
  }
  // fallback
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  return Promise.resolve();
}

function hasSpeechRecognition() {
  return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
}

// Italian text matching only — David speaks the Italian answer, we match it.
function matchVoice(transcripts, optionTexts) {
  const clean = s => s.toLowerCase().replace(/[^a-zàèéìíîòóùú'\s]/gi, '').trim();
  // Strip articles; split into content words; require a match of the longest content word
  const optData = optionTexts.map(o => {
    const stripped = clean(o).replace(/^(il |la |lo |i |gli |le |l')/, '');
    const words = stripped.split(/[\s,/()]+/).filter(w => w.length > 3); // only meaningful words
    return { stripped, words };
  });

  for (const raw of transcripts) {
    const heard = clean(raw);
    for (let i = 0; i < optData.length; i++) {
      const { stripped, words } = optData[i];
      // Exact phrase match
      if (heard === stripped) return i;
      // All long content words appear in what was heard (stricter than "any word")
      if (words.length > 0 && words.every(w => heard.includes(w))) return i;
      // At least 2 words match if there are multiple (avoids single-word coincidences)
      if (words.length >= 2 && words.filter(w => heard.includes(w)).length >= 2) return i;
      // Single long word (≥5 chars) exact match
      if (words.length === 1 && words[0].length >= 5 && heard.includes(words[0])) return i;
    }
  }
  return -1;
}

function startRecognition(slideIndex, onResult) {
  if (!hasSpeechRecognition()) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'it-IT';  // David speaks Italian to select answers
  recognition.interimResults = false;
  recognition.maxAlternatives = 5;

  recognition.onresult = (e) => {
    // Collect ALL alternatives, not just the top one
    const alts = [];
    for (let i = 0; i < e.results[0].length; i++) {
      alts.push(e.results[0][i].transcript);
    }
    onResult(alts);
  };
  recognition.onerror = (e) => {
    showToast('Ошибка микрофона: ' + e.error);
    const micBtn = document.getElementById('micBtn');
    if (micBtn) {
      micBtn.classList.remove('recording');
      micBtn.innerHTML = '🎤 Ответить голосом';
    }
  };
  recognition.onend = () => {
    const micBtn = document.getElementById('micBtn');
    if (micBtn) {
      micBtn.classList.remove('recording');
      micBtn.innerHTML = '🎤 Ответить голосом';
    }
  };
  recognition.start();
}

  if (clozeRecognition) { try { clozeRecognition.stop(); } catch(e){} clozeRecognition = null; }
  if (translateRecognition) { try { translateRecognition.stop(); } catch(e){} translateRecognition = null; }
  if (dialogueRecognition) { try { dialogueRecognition.stop(); } catch(e){} dialogueRecognition = null; }
  if (retellRecognition) { try { retellRecognition.stop(); } catch(e){} retellRecognition = null; }

  updateProgress();

  const slide = SLIDES[currentSlide];
  const content = document.getElementById('slideContent');
  const navFooter = document.getElementById('navFooter');
  const btnBack = document.getElementById('btnBack');
  const btnNext = document.getElementById('btnNext');

  // Animation class
  content.className = direction === 'back' ? 'slide-back' : 'slide-wrapper';
  // Force reflow
  void content.offsetWidth;

  // Nav defaults
  navFooter.style.display = 'flex';
  btnBack.disabled = currentSlide === 0;
  btnNext.disabled = false;
  btnNext.textContent = 'Далее →';
  btnNext.classList.add('primary');

  if (slide.type === 'intro') {
    content.innerHTML = renderIntro();
    navFooter.style.display = 'none';
  } else if (slide.type === 'story') {
    content.innerHTML = renderStory(slide, currentSlide);
    attachStoryEvents(slide, currentSlide);
    // Hide next button (nav is shown, user can go forward freely)
  } else if (slide.type === 'quiz') {
    content.innerHTML = renderQuiz(slide, currentSlide);
    attachQuizEvents(slide, currentSlide);
    // Lock next until answered
    const answered = quizAnswers.hasOwnProperty(slide.quizIndex);
    if (!answered) {
      btnNext.disabled = true;
    }
  } else if (slide.type === 'cloze') {
    content.innerHTML = renderCloze(slide, currentSlide);
  } else if (slide.type === 'translate') {
    content.innerHTML = renderTranslate(slide, currentSlide);
  } else if (slide.type === 'dialogue') {
    content.innerHTML = renderDialogue(slide, currentSlide);
    setTimeout(() => autoPlayDialogue(slide), 600);
  } else if (slide.type === 'retell') {
    content.innerHTML = renderRetell(slide, currentSlide);

// ── OPTION 1: Read-Aloud Echo Check ──────────
let echoRecognition = null;

let echoAccumulated = [];  // words heard across multiple recognition segments
let echoStopping = false;  // true when user pressed stop

function handleEcho(expectedText) {
  const btn = document.getElementById('echoBtn');
  const result = document.getElementById('echoResult');

  // STOP: user pressed again while recording
  if (echoRecognition || echoStopping) {
    echoStopping = true;
    if (echoRecognition) { try { echoRecognition.stop(); } catch(e){} }
    return;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Микрофон не поддерживается в этом браузере'); return; }

  echoAccumulated = [];
  echoStopping = false;
  btn.classList.add('recording');
  btn.textContent = '⏹ Стоп (нажми чтобы завершить)';
  result.style.display = 'none';

  function startEchoSession() {
    if (echoStopping) {
      // User stopped — show final feedback
      btn.classList.remove('recording');
      btn.textContent = '🎤 Повтори ещё раз';
      echoRecognition = null;
      if (echoAccumulated.length) showEchoFeedback(echoAccumulated, expectedText);
      return;
    }
    const sr = new SR();
    sr.lang = 'it-IT';
    sr.maxAlternatives = 8;
    sr.interimResults = false;
    sr.continuous = false; // single-segment; we restart for continuous effect

    sr.onresult = (e) => {
      for (let i = 0; i < e.results[0].length; i++) echoAccumulated.push(e.results[0][i].transcript);
      // Live preview as David speaks
      showEchoFeedback(echoAccumulated, expectedText);
    };
    sr.onerror = (ev) => {
      if (ev.error === 'no-speech' || ev.error === 'aborted') return; // just restart
      btn.classList.remove('recording');
      btn.textContent = '🎤 Повтори вслух';
      echoRecognition = null; echoStopping = false;
    };
    sr.onend = () => {
      echoRecognition = null;
      // Auto-restart unless user stopped
      if (!echoStopping) {
        setTimeout(startEchoSession, 80);
      } else {
        btn.classList.remove('recording');
        btn.textContent = '🎤 Повтори ещё раз';
        if (echoAccumulated.length) showEchoFeedback(echoAccumulated, expectedText);
      }
    };
    echoRecognition = sr;
    try { sr.start(); } catch(e) { echoRecognition = null; }
  }

  startEchoSession();
}

function showEchoFeedback(transcripts, expected) {
  const allHeard = transcripts.map(t => t.toLowerCase()).join(' ');
  const cleanWord = w => w.replace(/[^a-zàèéìíîòóùú']/gi, '').toLowerCase();
  const expectedWords = expected.split(/\s+/).map(w => cleanWord(w)).filter(w => w.length > 0);
  const heardWords = allHeard.split(/\s+/).map(w => cleanWord(w));

  const hits = expectedWords.map(w => {
    if (w.length <= 1) return true;
    return heardWords.some(h => h === w || h.includes(w) || w.includes(h));
  });

  const matchCount = hits.filter(Boolean).length;
  const pct = Math.round(matchCount / expectedWords.length * 100);

  const wordsHTML = expectedWords.map((w, i) =>
    `<span class="echo-w ${hits[i] ? 'hit' : 'miss'}">${w}</span>`
  ).join(' ');

  const badge = pct >= 90 ? '🌟 Ottimo!' : pct >= 70 ? '👍 Bene!' : pct >= 50 ? '🔄 Ancora!' : '🔁 Прочитай ещё раз';
  const result = document.getElementById('echoResult');
  result.innerHTML = `
    <div class="echo-words">${wordsHTML}</div>
    <div class="echo-score">${badge} &nbsp;${pct}% слов совпало</div>
    <div class="echo-heard">🎤 Распознал: "${transcripts[0] || '—'}"</div>
  `;
  result.style.display = 'block';
}

function renderQuiz(slide, idx) {
  const answered = quizAnswers.hasOwnProperty(slide.quizIndex);
  const chosen = answered ? quizAnswers[slide.quizIndex + '_chosen'] : null;

  let optionsHTML = slide.options.map((opt, i) => {
    let cls = 'quiz-option';
    if (answered) {
      if (i === slide.correct) cls += ' correct';
      else if (i === chosen && i !== slide.correct) cls += ' wrong';
      else cls += ' disabled';
    }
    return `<button class="${cls}" ${answered ? 'disabled' : ''} onclick="handleQuizAnswer(${idx}, ${i})">${opt.label}) ${escHtml(opt.text)}</button>`;
  }).join('');

  const micVisible = hasSpeechRecognition() && !answered;
  const micHTML = micVisible ? `
    <div class="quiz-mic-row">
      <button class="btn-mic" id="micBtn" onclick="handleMic(${idx})">🎤 Ответить голосом</button>
      <span class="mic-hint">или говори ответ вслух</span>
    </div>` : '';

  return `
  <div class="slide-body">
    <div class="quiz-label">❓ Вопрос ${slide.quizIndex} / ${totalQuizCount()}</div>
    <div class="quiz-question">${escHtml(slide.question)}</div>
    <div class="quiz-options" id="quizOptions">${optionsHTML}</div>
    ${micHTML}
    <div class="quiz-explanation ${answered ? 'visible' : ''}" id="quizExplanation">${escHtml(slide.explanation)}</div>
  </div>`;
}

function attachQuizEvents(slide, idx) {
  // Nothing extra — handled via onclick
}

function handleQuizAnswer(slideIdx, chosenIdx) {
  const slide = SLIDES[slideIdx];
  if (quizAnswers.hasOwnProperty(slide.quizIndex)) return;

  const isCorrect = chosenIdx === slide.correct;
  quizAnswers[slide.quizIndex] = isCorrect;
  quizAnswers[slide.quizIndex + '_chosen'] = chosenIdx;

  // Update option styles
  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === slide.correct) btn.classList.add('correct');
    else if (i === chosenIdx) btn.classList.add('wrong');
    else btn.classList.add('disabled');
  });

  // Show explanation
  const expBox = document.getElementById('quizExplanation');
  if (expBox) expBox.classList.add('visible');

  // Unlock next
  document.getElementById('btnNext').disabled = false;

  // Remove mic button
  const micRow = document.querySelector('.quiz-mic-row');
  if (micRow) micRow.remove();

  if (isCorrect) {
    showToast('✅ Правильно!', 2000);
  } else {
    showToast('❌ Не совсем — смотри объяснение', 2500);
  }

  saveProgress();
}

function handleMic(slideIdx) {
  const micBtn = document.getElementById('micBtn');
  if (!micBtn) return;
  const slide = SLIDES[slideIdx];

  if (recognition) {
    try { recognition.stop(); } catch(e) {}
    recognition = null;
    micBtn.classList.remove('recording');
    micBtn.innerHTML = '🎤 Ответить голосом';
    return;
  }

  micBtn.classList.add('recording');
  micBtn.innerHTML = '⏹ Остановить';

  startRecognition(slideIdx, (alts) => {
    const opts = slide.options;
    const optTexts = opts.map(o => o.text);
    const matched = matchVoice(alts, optTexts);

    if (matched >= 0) {
      showToast(`🎤 Распознал: "${alts[0]}"`, 1200);
      setTimeout(() => handleQuizAnswer(slideIdx, matched), 400);
    } else {
      showToast(`🎤 Слышу: "${alts[0]}" — скажи «А», «Б», «В» или само слово`, 3500);
    }
    recognition = null;
  });
}

    `}

function handleClozeVoice(idx, answer) {
  const btn = document.getElementById('clozeMicBtn');
  if (clozeRecognition) {
    clozeRecognition.stop(); clozeRecognition = null;
    btn.classList.remove('recording'); btn.textContent = '🎤 Скажи слово';
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Микрофон не поддерживается в этом браузере'); return; }
  clozeRecognition = new SR();
  clozeRecognition.lang = 'it-IT';
  clozeRecognition.maxAlternatives = 5;
  btn.classList.add('recording'); btn.textContent = '⏹ Слушаю...';
  clozeRecognition.onresult = (e) => {
    const heard = [];
    for (let i = 0; i < e.results[0].length; i++) heard.push(e.results[0][i].transcript.toLowerCase().trim());
    const clean = w => w.replace(/[^a-zàèéìíîòóùú']/gi,'').toLowerCase();
    const target = clean(answer);
    const correct = heard.some(h => clean(h) === target || clean(h).includes(target) || target.includes(clean(h)));
    clozeAnswered[idx] = correct;
    btn.classList.remove('recording'); clozeRecognition = null;
    showClozeResult(correct, answer);
    if (correct) { setTimeout(() => { document.getElementById('slideContent').innerHTML = renderCloze(SLIDES[idx], idx); }, 800); }
  };
  clozeRecognition.onerror = () => {
    btn.classList.remove('recording'); btn.textContent = '🎤 Скажи слово'; clozeRecognition = null;
    showToast('Не удалось распознать. Попробуй снова.');
  };
  clozeRecognition.onend = () => { clozeRecognition = null; };
  clozeRecognition.start();
}

function handleClozeSubmit(idx, answer) {
  const input = document.getElementById('clozeInput');
  if (!input) return;
  const typed = input.value.trim().toLowerCase();
  const clean = w => w.replace(/[^a-zàèéìíîòóùú']/gi,'').toLowerCase();
  const correct = clean(typed) === clean(answer) || clean(answer).includes(clean(typed));
  clozeAnswered[idx] = correct;
  showClozeResult(correct, answer);
  setTimeout(() => { document.getElementById('slideContent').innerHTML = renderCloze(SLIDES[idx], idx); }, 800);
}

function showClozeResult(correct, answer) {
  const fb = document.getElementById('clozeFeedback');
  if (!fb) return;
  fb.className = 'cloze-feedback ' + (correct ? 'correct' : 'wrong');
  fb.textContent = correct ? `✅ Правильно! "${answer}"` : `❌ Правильный ответ: "${answer}"`;
  fb.style.display = 'block';
}

    <div class="retell-label">📝 Перескажи историю</div>
    <div class="retell-prompt">${escHtml(slide.prompt)}</div>
    <div class="retell-subprompt">${escHtml(slide.subprompt)}</div>
    ${!done ? `
    <button class="btn-retell-mic" id="retellMicBtn" onclick="handleRetellMic(${idx}, ${sq(slide.keywords)})">🎤 Начни рассказывать</button>
    ` : ''}
    <div id="retellResult_${idx}" ${done ? '' : 'style="display:none"'}>
      <div class="retell-keywords" id="retellKeywords_${idx}"></div>
      <div class="retell-score-line" id="retellScore_${idx}"></div>
      <div class="retell-heard" id="retellHeard_${idx}"></div>
      <button class="btn-retell-mic" style="margin-top:12px;background:#1565c0;color:#fff" onclick="resetRetell(${idx}, ${sq(slide.keywords)})">🔄 Попробовать снова</button>
    </div>
  </div>`;
}

const retellDone = {};

function handleRetellMic(idx, keywords) {
  const btn = document.getElementById('retellMicBtn');
  if (retellRecognition) {
    retellRecognition.stop(); retellRecognition = null;
    btn.classList.remove('recording'); btn.textContent = '🎤 Начни рассказывать';
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Микрофон не поддерживается в этом браузере'); return; }
  retellRecognition = new SR();
  retellRecognition.lang = 'it-IT';
  retellRecognition.maxAlternatives = 3;
  retellRecognition.continuous = true;
  retellRecognition.interimResults = false;
  btn.classList.add('recording'); btn.textContent = '⏹ Говори… (нажми чтобы остановить)';

  let fullTranscript = '';
  retellRecognition.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) fullTranscript += ' ' + e.results[i][0].transcript;
    }
  };
  retellRecognition.onend = () => {
    retellRecognition = null;
    btn.classList.remove('recording');
    showRetellResult(idx, keywords, fullTranscript.trim());
  };
  retellRecognition.onerror = () => {
    retellRecognition = null;
    btn.classList.remove('recording'); btn.textContent = '🎤 Начни рассказывать';
    if (fullTranscript) showRetellResult(idx, keywords, fullTranscript.trim());
    else showToast('Не удалось распознать. Попробуй снова.');
  };
  retellRecognition.start();
}

function showRetellResult(idx, keywords, heard) {
  retellDone[idx] = true;
  const clean = w => w.replace(/[^a-zàèéìíîòóùú']/gi,'').toLowerCase();
  const heardWords = heard.toLowerCase().split(/\s+/);
  const hits = keywords.map(kw => {
    const k = clean(kw);
    return heardWords.some(h => clean(h) === k || clean(h).includes(k) || k.includes(clean(h)));
  });
  const count = hits.filter(Boolean).length;
  const pct = Math.round(count / keywords.length * 100);
  const badge = pct >= 80 ? '🏆 Magnifico!' : pct >= 60 ? '🌟 Ottimo!' : pct >= 40 ? '👍 Bene!' : '🔄 Ancora!';

  const kwHTML = keywords.map((kw,i) =>
    `<span class="retell-kw ${hits[i]?'found':'not-found'}">${hits[i]?'✅':'❌'} ${kw}</span>`
  ).join('');

  const result = document.getElementById(`retellResult_${idx}`);
  const kwDiv = document.getElementById(`retellKeywords_${idx}`);
  const scoreDiv = document.getElementById(`retellScore_${idx}`);
  const heardDiv = document.getElementById(`retellHeard_${idx}`);
  if (kwDiv) kwDiv.innerHTML = kwHTML;
  if (scoreDiv) scoreDiv.textContent = `${badge} — ${count}/${keywords.length} ключевых слов`;
  if (heardDiv) heardDiv.textContent = `🎤 Распознал: "${heard||'—'}"`;
  if (result) result.style.display = 'block';

  const btn = document.getElementById('retellMicBtn');
  if (btn) btn.style.display = 'none';
}

function resetRetell(idx, keywords) {
  retellDone[idx] = false;
  document.getElementById('slideContent').innerHTML = renderRetell(SLIDES[idx], idx);
}

function renderResults() {
  const fs = fullScore();
  const totalC = fs.quiz.c + fs.cloze.c + fs.translate.c + fs.dialogue.c;
  const totalT = fs.quiz.t + fs.cloze.t + fs.translate.t + fs.dialogue.t;
  const pct = totalT ? Math.round(totalC / totalT * 100) : 0;

  const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '🎉' : '💪';
  const title = pct >= 80 ? 'Отлично! / Excellent!' : pct >= 60 ? 'Хорошо! / Good job!' : 'Продолжай! / Keep going!';
  const message = pct >= 80
    ? 'Ты прошёл все задания урока! Иван гордился бы тобой. / You nailed Lesson 1! Ivan would be proud! 🍅'
    : pct >= 60
    ? 'Хорошая работа! Перечитай абзацы, где ошибся. / Good effort! Review the paragraphs where you slipped. 💪'
    : 'Попробуй ещё раз — с каждым разом лучше! / Try again — every attempt makes you stronger! 🇮🇹';

  const row = (label, s) => s.t > 0
    ? `<div style="display:flex;justify-content:space-between;font-size:14px;padding:4px 0;border-bottom:1px solid #f0f0f0">
        <span>${label}</span>
        <span style="font-weight:700;color:${s.c===s.t?'#009246':'#ce2b37'}">${s.c}/${s.t}</span>
       </div>` : '';

  return `
  <div class="slide-body">
    <div class="results-emoji">${emoji}</div>
    <div class="results-title">${title}</div>
    <div class="results-score">${totalC}<span> / ${totalT}</span></div>
    <div style="background:#f8f9fa;border-radius:10px;padding:10px 14px;margin:8px 0;font-size:13px">
      ${row('❓ Вопросы / Comprehension', fs.quiz)}
      ${row('✏️ Заполни пропуск / Fill blank', fs.cloze)}
      ${row('🌐 Перевод вслух / Translate aloud', fs.translate)}
      ${row('🎭 Диалог / Dialogue', fs.dialogue)}
    </div>
    <div class="results-message">${message}</div>
    <div style="font-size:12px;color:#aaa;text-align:center;margin-top:4px">📊 Результат сохранён в Google Sheets / Score saved to Sheets</div>
    <div class="results-actions">
      <button class="btn-restart" onclick="restartStory()">🔄 Повторить / Retry</button>
    </div>
  </div>`;
}

function attachResultsEvents() {
  const fs = fullScore();
  const totalC = fs.quiz.c + fs.cloze.c + fs.translate.c + fs.dialogue.c;
  const totalT = fs.quiz.t + fs.cloze.t + fs.translate.t + fs.dialogue.t;
  const d = new Date().toISOString().slice(0, 10);
  const detail = `Q:${fs.quiz.c}/${fs.quiz.t} Fill:${fs.cloze.c}/${fs.cloze.t} Tr:${fs.translate.c}/${fs.translate.t} Dial:${fs.dialogue.c}/${fs.dialogue.t}`;
  fetch('http://72.61.95.202:7891/score', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      date: d, lesson: 'Урок 1 — Il Mercato', quizType: `Story + Exercises (${detail})`,
      score: totalC, total: totalT,
      url: 'https://ilia-personal.github.io/david-italiano/lesson-01-story.html'
    })
  }).catch(() => {});
}

function restartStory() {
  quizAnswers = {};
  translationState = {};
  currentSlide = 0;
  saveProgress();
  render('forward');
}

function handleCopyResultsSlack(correct, total) {
  const msg = `🇮🇹 Il Mercato di Roma — Урок 1\nРезультат: ${correct}/${total} правильных ответов`;
  copyToClipboard(msg).then(() => {
    showToast('Скопировано! Вставь в Slack 📋', 3000);
  }).catch(() => {
    showToast('Не удалось скопировать');
  });
}

// ─────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────
function navigate(dir) {
  const newIdx = currentSlide + dir;
  if (newIdx < 0 || newIdx >= TOTAL_SLIDES) return;
  currentSlide = newIdx;
  render(dir < 0 ? 'back' : 'forward');
}

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// Safe JSON for use inside onclick="..." attributes — encodes " as &quot;
// so the HTML attribute boundary isn't broken by the string delimiter.
function sq(v) { return JSON.stringify(v).replace(/"/g, '&quot;'); }

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
loadProgress();
render('forward');
</script>
